<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartParking - Mon Portefeuille</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f3f4f6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .app-shell { max-width: 450px; margin: 0 auto; width: 100%; flex: 1; background: #f3f4f6; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .content-card { background: white; border-radius: 2.5rem 2.5rem 0 0; flex: 1; margin-top: 1rem; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); }
        
        /* Style de la carte bancaire "Glassmorphism" */
        .credit-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            position: relative;
            overflow: hidden;
        }
        .credit-card::before {
            content: ''; position: absolute; top: -50%; left: -20%; width: 100%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(35deg);
        }
    </style>
</head>
<body>

    <header class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-6 py-5 shrink-0 shadow-lg w-full">
        <div class="max-w-[450px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-2xl">🚗</div>
                <div><h1 class="font-bold text-xl">SmartParking</h1><p class="text-xs text-blue-100 opacity-80">Mon Portefeuille</p></div>
            </div>
            <button class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center"><i data-lucide="plus" class="w-5 h-5"></i></button>
        </div>
    </header>

    <div class="app-shell">
        <main class="content-card overflow-y-auto px-6 py-8 pb-32">
            <h2 class="text-2xl font-black text-gray-800 mb-6">Mes Cartes</h2>

            <div class="credit-card w-full aspect-[1.58/1] rounded-[2rem] p-6 text-white shadow-2xl mb-8 flex flex-col justify-between">
                <div class="flex justify-between items-start">
                    <div class="w-12 h-10 bg-yellow-400/80 rounded-lg opacity-80"></div> <i data-lucide="wifi" class="w-6 h-6 rotate-90 opacity-60"></i>
                </div>
                
                <div>
                    <p class="text-lg tracking-[0.2em] font-medium mb-4">**** **** **** 4242</p>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[10px] uppercase opacity-60 font-bold">Titulaire</p>
                            <p class="text-sm font-bold">MOHAMED AMINE</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] uppercase opacity-60 font-bold">Expire</p>
                            <p class="text-sm font-bold">12/27</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 rounded-3xl p-6 border border-gray-100 mb-8">
                <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-1">Solde disponible</p>
                <div class="flex justify-between items-center">
                    <h3 class="text-3xl font-black text-gray-800">145.50 DH</h3>
                    <button class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-blue-200">+ Recharger</button>
                </div>
            </div>

            <h3 class="text-lg font-bold text-gray-800 mb-4">Options</h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-green-50 text-green-600 rounded-xl flex items-center justify-center"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
                        <span class="font-bold text-gray-700">Paiement sans contact</span>
                    </div>
                    <div class="w-10 h-5 bg-blue-600 rounded-full relative"><div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div></div>
                </div>
            </div>
        </main>

        <nav class="bg-white border-t px-2 py-2 shrink-0 absolute bottom-0 left-0 right-0 z-50">
            <div class="flex justify-around items-center max-w-[450px] mx-auto">
                <a href="dashboard.html" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl text-gray-400"><i data-lucide="search" class="w-5 h-5"></i><span class="text-[9px] uppercase font-bold">Trouver</span></a>
                <a href="ma-place.html" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl text-gray-400"><i data-lucide="bookmark" class="w-5 h-5"></i><span class="text-[9px] uppercase font-bold">Ma place</span></a>
                <a href="ma-carte.html" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl text-blue-600 bg-blue-50 scale-105"><i data-lucide="credit-card" class="w-5 h-5"></i><span class="text-[9px] uppercase font-bold">Carte</span></a>
                <a href="stats.html" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl text-gray-400"><i data-lucide="bar-chart-3" class="w-5 h-5"></i><span class="text-[9px] uppercase font-bold">Stats</span></a>
            </div>
        </nav>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
