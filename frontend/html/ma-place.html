<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartParking - Ma Place</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f3f4f6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .app-shell { max-width: 450px; margin: 0 auto; width: 100%; flex: 1; background: #f3f4f6; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .content-card { background: white; border-radius: 2.5rem 2.5rem 0 0; flex: 1; margin-top: 1rem; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); }
        .ticket-cut { position: relative; }
        .ticket-cut::before, .ticket-cut::after {
            content: ''; position: absolute; width: 20px; height: 20px; 
            background: #f3f4f6; border-radius: 50%; top: 50%; transform: translateY(-50%);
        }
        .ticket-cut::before { left: -11px; }
        .ticket-cut::after { right: -11px; }
    </style>
</head>
<body>

    <header class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-6 py-5 shrink-0 shadow-lg w-full">
        <div class="max-w-[450px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-2xl">🚗</div>
                <div><h1 class="font-bold text-xl">SmartParking</h1><p class="text-xs text-blue-100 opacity-80">Ma Place</p></div>
            </div>
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center"><i data-lucide="bell" class="w-5 h-5"></i></div>
        </div>
    </header>

    <div class="app-shell">
        <main class="content-card overflow-y-auto px-6 py-8 pb-24">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-gray-800">Réservation Active</h2>
            </div>

            <div class="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden">
                <div class="p-8 text-center">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                        <i data-lucide="car" class="w-8 h-8 text-white"></i>
                    </div>
                    <h2 class="text-5xl font-black text-gray-800">B-12</h2>
                    <p class="text-gray-400 text-sm mt-1">Parking Secteur Agdal, Rabat</p>
                </div>

                <div class="ticket-cut border-t-2 border-dashed border-gray-100 h-1 w-full bg-white"></div>

                <div class="p-8 bg-gray-50/50">
                    <div class="grid grid-cols-2 gap-6 mb-8">
                        <div><p class="text-[10px] text-gray-400 uppercase font-bold">Entrée</p><p class="text-lg font-bold">14:30</p></div>
                        <div class="text-right"><p class="text-[10px] text-gray-400 uppercase font-bold">Date</p><p class="text-lg font-bold">08 Avr.</p></div>
                    </div>
                    <button class="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                        <i data-lucide="qr-code" class="w-5 h-5"></i> Sortir du Parking
                    </button>
                </div>
            </div>
        </main>

        <nav class="bg-white border-t px-2 py-2 shrink-0 absolute bottom-0 left-0 right-0 z-50">
            <div class="flex justify-around items-center max-w-[450px] mx-auto">
                <a href="dashboard.html" class="flex flex-col items-center gap-1 px-5 py-2 rounded-xl text-gray-400"><i data-lucide="search" class="w-6 h-6"></i><span class="text-[10px]">Trouver</span></a>
                <a href="ma-place.html" class="flex flex-col items-center gap-1 px-5 py-2 rounded-xl text-blue-600 bg-blue-50 scale-105"><i data-lucide="bookmark" class="w-6 h-6"></i><span class="text-[10px]">Ma place</span></a>
                <a href="stats.html" class="flex flex-col items-center gap-1 px-5 py-2 rounded-xl text-gray-400"><i data-lucide="bar-chart-3" class="w-6 h-6"></i><span class="text-[10px]">Stats</span></a>
            </div>
        </nav>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
